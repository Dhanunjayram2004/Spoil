<!DOCTYPE html>

<html lang="en">

<head>
  

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SPOIL Editor</title>

  <script src="./node_modules/monaco-editor/min/vs/loader.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0d0d0f;
    --panel:     #141416;
    --surface:   #1a1a1e;
    --elevated:  #202024;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --text:      #e8e8ec;
    --muted:     #6b6b78;
    --accent:    #5b7cf6;
    --accent-h:  #7b96ff;
    --accent-bg: rgba(91,124,246,0.12);
    --green:     #3ecf8e;
    --red:       #f66;
    --amber:     #f5a623;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
    --shadow:    0 4px 24px rgba(0,0,0,0.5);
    --r:         6px;
    --r-lg:      10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    user-select: none;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  button, input, select, textarea { font: inherit; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ── App shell ── */
  #app-shell { display: flex; height: 100vh; width: 100vw; }

  /* ── Activity bar ── */
  #activity-bar {
    width: 48px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    gap: 4px;
    flex-shrink: 0;
  }

  .activity-icon {
    width: 36px; height: 36px;
    border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    color: var(--muted);
    cursor: pointer;
    transition: background 140ms, color 140ms;
    position: relative;
  }
  .activity-icon:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .activity-icon.active { background: var(--accent-bg); color: var(--accent-h); }
  .activity-icon.active::before {
    content: '';
    position: absolute;
    left: -1px; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; min-width: 200px; max-width: 380px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    resize: horizontal; overflow: hidden;
  }

  .sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-header h2 {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
  }
  .sidebar-actions { display: flex; gap: 4px; }
  .sidebar-actions button {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: var(--r);
    padding: 3px 8px; font-size: 11px; cursor: pointer;
    transition: color 140ms, border-color 140ms;
  }
  .sidebar-actions button:hover { color: var(--text); border-color: var(--border2); }

  #explorer-tree { flex: 1; overflow-y: auto; padding: 6px 4px 16px; }

  .tree-node {
    border-radius: var(--r);
    font-size: 12.5px; cursor: pointer;
    color: var(--text);
    display: flex; flex-direction: column;
    transition: background 100ms;
  }
  .tree-node:hover > .node-header,
  .tree-node.file:hover { background: rgba(255,255,255,0.04); }

  .tree-node.expanded > .tree-children { display: block; }
  .tree-node .tree-children { width: 100%; display: none; }

  .node-header {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 6px; border-radius: var(--r);
    width: 100%;
  }
  .node-toggle { width: 14px; text-align: center; color: var(--muted); font-size: 10px; flex-shrink: 0; }
  .tree-node.file { flex-direction: row; align-items: center; gap: 6px; padding: 3px 8px; }

  .workspace-banner {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
    word-break: break-all;
  }
  .workspace-banner #workspace-banner-text { color: var(--text); font-size: 11.5px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Editor surface ── */
  #editor-surface {
    flex: 1; min-width: 300px;
    display: flex; flex-direction: column;
    background: #1e1e1e;
  }

  #tab-strip {
    height: 36px; display: flex; align-items: flex-end;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    overflow-x: auto; flex-shrink: 0;
  }
  .editor-tab {
    flex: 0 0 auto; height: 100%;
    padding: 0 14px 0 12px;
    display: flex; align-items: center; gap: 8px;
    border-right: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    min-width: 120px; max-width: 180px;
    font-size: 12px;
    transition: background 120ms, color 120ms;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .editor-tab:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .editor-tab.active { color: var(--text); background: #1e1e1e; border-bottom: 2px solid var(--accent); }
  .tab-close { color: var(--muted); font-size: 15px; cursor: pointer; flex-shrink: 0; opacity: 0; transition: opacity 120ms; }
  .editor-tab:hover .tab-close { opacity: 1; }
  .editor-tab.active .tab-close { opacity: 0.5; }
  .tab-close:hover { color: var(--red) !important; opacity: 1 !important; }

  #editor-host { flex: 1; min-height: 200px; }

  /* ── Dock ── */
  #dock-panel {
    height: 220px; flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--panel);
    display: flex; flex-direction: column;
  }
  #dock-tabs {
    height: 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0;
    padding: 0 8px; flex-shrink: 0;
  }
  .dock-tab {
    cursor: pointer; padding: 0 12px; height: 100%;
    display: flex; align-items: center;
    font-size: 11.5px; font-weight: 500; letter-spacing: 0.04em;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: color 140ms;
  }
  .dock-tab:hover { color: var(--text); }
  .dock-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  #dock-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .dock-pane {
    height: 100%; overflow: auto; padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6;
    white-space: pre-wrap; color: #a8d8a0; display: none;
  }
  .dock-pane.active { display: block; }
  #output-pane { color: #9ab8d8; }

  /* ── AI Panel ── */
  #ai-panel {
    width: 360px; min-width: 300px; max-width: 480px;
    border-left: 1px solid var(--border);
    background: var(--panel);
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }

  .panel-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .panel-header-title { display: flex; align-items: center; gap: 8px; }
  .panel-header h3 { font-size: 13px; font-weight: 600; color: var(--text); }
  .panel-meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 99px;
    background: var(--accent-bg); color: var(--accent-h);
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.04em;
    border: 1px solid rgba(91,124,246,0.2);
  }

  /* ── Chat ── */
  #chat-history {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .chat-message-row { display: flex; gap: 8px; align-items: flex-start; }
  .chat-message-row.user { justify-content: flex-end; }
  .chat-message-row.system { justify-content: center; }

  .chat-avatar {
    width: 26px; height: 26px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--elevated); color: var(--muted);
    font-size: 10px; font-weight: 700; flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .chat-message-row.agent .chat-avatar { background: var(--accent-bg); color: var(--accent-h); border-color: rgba(91,124,246,0.25); }
  .chat-message-row.user .chat-avatar { display: none; }

  .chat-message-body { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
  .chat-message-row.user .chat-message-body { align-items: flex-end; max-width: 85%; }
  .chat-message-row.system .chat-message-body { align-items: center; max-width: 100%; }

  .chat-message-header { display: flex; align-items: center; gap: 6px; }
  .chat-message-author { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .chat-message-meta { font-size: 10.5px; color: var(--muted); opacity: 0.6; }

  .chat-bubble {
    padding: 10px 13px; border-radius: 10px;
    font-size: 13px; line-height: 1.6;
    max-width: 100%; word-break: break-word;
    border: 1px solid transparent;
  }
  .chat-bubble.user {
    background: var(--accent-bg);
    border-color: rgba(91,124,246,0.2);
    color: #d4ddff;
    border-radius: 10px 10px 2px 10px;
  }
  .chat-bubble.agent {
    background: var(--elevated);
    border-color: var(--border);
    color: var(--text);
    border-radius: 2px 10px 10px 10px;
  }
  .chat-bubble.system {
    background: rgba(255,255,255,0.03);
    border-color: var(--border);
    color: var(--muted);
    font-size: 11.5px;
    border-radius: var(--r);
    padding: 6px 12px;
  }

  /* Markdown inside bubbles */
  .chat-markdown-rendered { display: flex; flex-direction: column; gap: 8px; background: transparent; border: 0; border-radius: 0; padding: 0; box-shadow: none; }
  .chat-markdown-paragraph { margin: 0; font-size: 13px; line-height: 1.65; white-space: normal; }

  .code-window-container {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    background: #161618;
  }
  .code-window-header {
    padding: 7px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .code-window-header::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.6; }
  .code-window-body { padding: 12px; overflow-x: auto; }
  .code-window-pre { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; color: #c9d1d9; white-space: pre; }

  /* ── Composer ── */
  #composer-controls {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
    background: var(--panel);
  }

  .composer-textarea-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    transition: border-color 160ms;
    overflow: hidden;
  }
  .composer-textarea-wrap:focus-within { border-color: rgba(91,124,246,0.4); }

  #composer-input {
    width: 100%; min-height: 80px; max-height: 200px;
    background: transparent; color: var(--text);
    border: none; padding: 11px 13px;
    resize: vertical; outline: none;
    font-size: 13px; line-height: 1.6;
  }
  #composer-input::placeholder { color: var(--muted); }

  .composer-row {
    display: flex; align-items: center; gap: 6px;
  }

  #model-picker {
    flex: 1; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--r);
    padding: 7px 10px; font-size: 12px; cursor: pointer;
    transition: border-color 140ms;
  }
  #model-picker:focus { outline: none; border-color: rgba(91,124,246,0.4); }

  #btn-send {
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--r);
    padding: 7px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 140ms, transform 80ms;
    white-space: nowrap;
  }
  #btn-send:hover { background: var(--accent-h); }
  #btn-send:active { transform: scale(0.97); }
  #btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #btn-stop {
    background: rgba(246,102,102,0.1); color: var(--red);
    border: 1px solid rgba(246,102,102,0.25);
    border-radius: var(--r); padding: 7px 14px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background 140ms; white-space: nowrap;
    display: none;
  }
  #btn-stop:hover { background: rgba(246,102,102,0.18); }

  /* ── Agent tracker ── */
  #agent-agentic-tracker {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    max-height: 140px; overflow-y: auto;
    flex-shrink: 0; display: none;
  }
  .tracker-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    font-weight: 600; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted);
  }
  #agent-loop-status { color: var(--green); font-weight: 700; }

  /* ── Settings panel ── */
  #settings-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 12px;
    margin-top: 4px;
  }
  .settings-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .settings-grid label { font-size: 11.5px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .settings-grid label span { color: var(--text); font-size: 12px; font-weight: 500; }
  .settings-grid input, .settings-grid select {
    background: var(--elevated); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--r);
    padding: 7px 9px; font-size: 12px;
    transition: border-color 140ms;
  }
  .settings-grid input:focus, .settings-grid select:focus { outline: none; border-color: rgba(91,124,246,0.4); }

  /* ── Status bar ── */
  #status-bar {
    height: 24px;
    background: var(--accent);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.9);
    flex-shrink: 0;
  }
  #status-bar.idle { background: #1a2a1a; }
  #status-details { color: rgba(255,255,255,0.6); }

  /* ── Context menu ── */
  #sidebar-context-menu {
    position: fixed; display: none;
    width: 170px;
    background: var(--elevated);
    border: 1px solid var(--border2);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    z-index: 1000;
    padding: 4px;
  }
  #sidebar-context-menu button {
    width: 100%; text-align: left;
    padding: 7px 10px; background: transparent;
    color: var(--text); border: none; border-radius: var(--r);
    cursor: pointer; font-size: 12.5px;
    transition: background 100ms;
  }
  #sidebar-context-menu button:hover { background: rgba(255,255,255,0.06); }

  /* ── Command palette ── */
  .command-palette-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(2px);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 80px; z-index: 2000;
  }
  .command-palette-card {
    width: min(640px, calc(100vw - 32px));
    background: var(--elevated);
    border: 1px solid var(--border2);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .command-palette-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; }
  .command-palette-card input {
    width: 100%; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--r);
    padding: 10px 12px; outline: none; font-size: 13.5px;
    transition: border-color 140ms;
  }
  .command-palette-card input:focus { border-color: rgba(91,124,246,0.4); }
  .command-palette-results { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto; }
  .command-palette-item {
    width: 100%; text-align: left; padding: 9px 11px;
    border-radius: var(--r); border: 1px solid transparent;
    background: transparent; color: var(--text); cursor: pointer;
    transition: background 100ms;
  }
  .command-palette-item:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
  .command-palette-item small { display: block; color: var(--muted); margin-top: 2px; font-size: 11.5px; }
</style>

</head>

      <div class="activity-icon active" data-action="explorer" title="Explorer">📁</div>

      <div class="activity-icon" data-action="search" title="Search">🔍</div>

      <div class="activity-icon" data-action="git" title="Source Control">🌿</div>

      <div class="activity-icon" data-action="settings" title="Settings">⚙️</div>

    </div>



    <aside id="sidebar">

      <div class="sidebar-header">

        <h2>Project Explorer</h2>

        <div class="sidebar-actions">

          <button id="refresh-explorer">Refresh</button>

          <button id="open-folder-btn">Open</button>

        </div>

      </div>

      <div id="explorer-tree"></div>

      <div class="workspace-banner">

        <div id="workspace-banner-text">No workspace selected.</div>

        <div id="workspace-status" style="margin-top: 8px;">Ready for native agent runs.</div>

      </div>

    </aside>



    <main id="editor-surface">

      <div id="tab-strip"></div>

      <div id="editor-host"></div>

      <div id="dock-panel">

          <div class="dock-tab active" data-pane="terminal-pane">Terminal</div>

          <div class="dock-tab" data-pane="output-pane">Output Console</div>

        </div>

        <div id="dock-content">

          <div id="terminal-pane" class="dock-pane active"></div>

          <div id="output-pane" class="dock-pane"></div>

        </div>

      </div>

    </main>



    <aside id="ai-panel">

      <div class="panel-header">

        <div>

          <h3>SPOIL Composer</h3>

          <div class="panel-meta">Local Ollama agent loop • Ctrl + L to focus</div>

        </div>

        <div class="tag">Agentic</div>

      </div>

     

      <div id="chat-history"></div>



      <div id="agent-agentic-tracker">

          <span>Agent execution</span>
          <span id="agent-loop-status">Idle</span>
        </div>

  </div>
  <div class="composer-row">

      <option value="llama3.2:3b">llama3.2:3b</option>
      <option value="phi4">phi4</option>
    </select>
    <button id="btn-send">Send</button>
    <button id="btn-stop">Stop</button>
  </div>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-grid">
      <label><span>AI Provider</span>
        <select id="ai-provider-picker">
          <option value="local">Local Ollama</option>
          <option value="openai-compatible">OpenAI Compatible</option>
        </select>
      </label>
      <label><span>API Base URL</span>
        <input id="api-base-url" type="text" placeholder="https://api.openai.com/v1" />
      </label>
      <label><span>API Key</span>
        <input id="api-key" type="password" placeholder="sk-..." />
      </label>
      <label><span>Model Name</span>
        <input id="api-model" type="text" placeholder="gpt-4o-mini" />
      </label>
      <label><span>Local Models</span>
        <button id="scan-models-btn" style="padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--elevated); color: var(--text); cursor: pointer; font-size: 12px;">Scan Ollama Models</button>
      </label>
      <label><span>Autosave</span>
        <select id="autosave-mode"><option value="on">Enabled</option><option value="off">Disabled</option></select>

      <label><span>Word Wrap</span>
        <select id="word-wrap-mode"><option value="on">Enabled</option><option value="off">Disabled</option></select>
      </label>
      <label><span>Minimap</span>
